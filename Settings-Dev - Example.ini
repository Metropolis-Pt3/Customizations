; =========================================================
; settings.ini
; Example enterprise Windows customization schema
; =========================================================

[+General]
; Version of the INI schema
ConfigVersion=1.0.1

; Logical environment name
Environment=Development

; Company/organization name
CompanyName=<Your Company>

; Short site/location code
; SiteCode=STP

; Default log file path
LogPath=C:\ProgramData\<Your Company>\Logs\configure-settings.log


[+System]
; Prefix to use if your script renames devices
; ComputerNamePrefix=STP

; Windows time zone ID
; TimeZone=Central Standard Time

; 1 = apply TimeZone, 0 = do not change
; SetTimeZone=1

; 1 = disable first logon animation
DisableFirstLogonAnimation=1

; 1 = disable consumer features / suggested apps
DisableConsumerFeatures=1

; 1 = disable lock screen, 0 = leave as-is
; DisableLockScreen=0

; 1 = enable Fast Startup, 0 = disable
EnableFastStartup=0


[+Explorer]
; 1 = show file extensions, 0 = hide them
ShowFileExtensions=1

; 1 = show hidden files, 0 = hide them
ShowHiddenFiles=0

; 1 = hide protected OS files, 0 = show them
HideProtectedOSFiles=1

; 1 = open Explorer to This PC, 0 = default/home
OpenFileExplorerToThisPC=0

; 1 = separate Explorer windows in separate process
LaunchFolderWindowsInSeparateProcess=0

; 1 = show Explorer status bar
ShowStatusBar=1

; 1 = show preview pane
ShowPreviewPane=0

; 1 = auto-expand navigation pane
AutoExpandNavigationPane=1


[+Taskbar]
; Left or Center
Alignment=Center

; 1 = show search box/icon
ShowSearchBox=1

; 1 = show Task View button
ShowTaskViewButton=1

; 1 = show widgets
ShowWidgets=0

; 1 = show chat / Teams consumer button
ShowChat=0

; 1 = auto-hide taskbar
AutoHideTaskbar=0

; 1 = combine buttons (interpretation is script-defined)
CombineTaskbarButtons=1


[+StartMenu]
; 1 = apply a Start layout
ApplyStartLayout=1

; Path to layout file (JSON or XML depending on your method)
StartLayoutFile=C:\ProgramData\<Your Company>\Layouts\StartLayout.json

; 1 = pin Edge (script-defined)
PinEdge=1

; 1 = pin Office apps (script-defined)
PinOffice=1

; 1 = pin company apps (script-defined)
; PinCompanyApps=1

; 1 = remove recommendations
RemoveRecommendations=1

; 1 = disable suggestions
DisableSuggestions=1


[+Desktop]
; Full path to desktop wallpaper
WallpaperPath=C:\ProgramData\<Your Company>\Branding\wallpaper.jpg

; Full path to lock screen image
LockScreenPath=C:\ProgramData\<Your Company>\Branding\lockscreen.jpg

; 1 = enable dark mode for user
; EnableDarkMode=0

; 1 = enable light mode for user
EnableLightMode=1

; Accent color label (script-defined)
AccentColor=Blue

; 1 = show This PC icon on desktop
DesktopIconsThisPC=1

; 1 = show Recycle Bin icon
DesktopIconsRecycleBin=1

; 1 = show Network icon
DesktopIconsNetwork=0


[-RemoteDesktop]
; 1 = enable RDP
; EnableRDP=1

; 1 = require NLA
; RequireNLA=1

; 1 = allow multiple sessions (script-defined / unsupported in stock client OS)
; AllowMultipleSessions=0

; 1 = enable firewall rules for RDP
; SetFirewallRules=1


[-Security]
; 1 = enable UAC
; EnableUAC=1

; Example scale: 0/1/2/3 (script-defined)
; UACLevel=2

; 1 = block USB storage
; DisableUSBStorage=1

; 1 = enable BitLocker (script-defined)
; EnableBitLocker=0

; 1 = enable Windows Firewall
; EnableFirewall=1

; 1 = enable SmartScreen (script-defined)
; EnableSmartScreen=1

; 1 = enable Defender real-time protection
; EnableDefenderRealtimeMonitoring=1

; 1 = disable password reveal button
; DisablePasswordReveal=1

; 1 = require Ctrl+Alt+Del at sign-in
; RequireCtrlAltDel=0


[-WindowsUpdate]
; 1 = configure internal WSUS server
; SetWUServer=0

; WSUS URL
; WUServerURL=

; 1 = enable automatic install behavior
; AutoInstallUpdates=1

; Active hours start (24h)
; ActiveHoursStart=08

; Active hours end (24h)
; ActiveHoursEnd=17

; 1 = pause updates
; PauseUpdates=0


[-WindowsFeatures]
; 1 = enable .NET Framework 3.5
; EnableNetFx3=0

; 1 = enable Hyper-V
; EnableHyperV=0

; 1 = enable Telnet Client
; EnableTelnetClient=0

; 1 = enable SMB1 (normally avoid)
; EnableSMB1=0

; 1 = enable Windows Subsystem for Linux
; EnableWSL=0

; 1 = enable Windows Sandbox
; EnableSandbox=0

; 1 = enable RSAT capability / components
; EnableRSAT=1


[-Applications]
; 1 = install Google Chrome
; InstallChrome=1

; 1 = install/configure Microsoft Edge
; InstallEdge=1

; 1 = install 7-Zip
; Install7Zip=1

; 1 = install Notepad++
; InstallNotepadPP=1

; 1 = install Microsoft 365 Apps
; InstallOffice=1

; 1 = install Teams
; InstallTeams=0

; 1 = remove Xbox app(s)
; RemoveXbox=1

; 1 = remove common preinstalled apps
; RemoveBloatware=1

; 1 = remove consumer apps
; RemoveConsumerApps=1


[-Office]
; Example: Current, MonthlyEnterprise, SemiAnnual
; UpdateChannel=MonthlyEnterprise

; 1 = enable Office updates
; EnableUpdates=1

; 1 = block macros from internet
; DisableMacrosFromInternet=1

; Default file format label
; DefaultFileFormat=OfficeOpenXML

; 1 = disable PST creation/use
; DisablePST=1

; 1 = enable Outlook cached mode
; EnableOutlookCaching=1


[-OneDrive]
; 1 = silently sign in users
; SilentlySignIn=1

; 1 = enable Known Folder Move
; EnableKnownFolderMove=1

; 1 = block personal OneDrive sync
; BlockPersonalSync=1

; Default OneDrive path
; SetDefaultFolder=C:\Users\%USERNAME%\OneDrive - Contoso

; 1 = use Files On-Demand
; FilesOnDemand=1


[-Network]
; 1 = configure proxy settings
; SetProxy=0

; Proxy server string
; ProxyServer=

; Semicolon-delimited bypass list
; ProxyBypass=localhost;127.0.0.1;*.contoso.com

; 1 = auto-detect proxy
; AutoDetectProxy=1

; Primary DNS server
; DNS1=10.10.1.10

; Secondary DNS server
; DNS2=10.10.1.11

; 1 = configure static IP
; SetStaticIP=0

; Static IP address
; IPAddress=

; Static subnet mask
; SubnetMask=

; Default gateway
; Gateway=


[-Printers]
; 1 = install/set default printer
; InstallDefaultPrinter=0

; Printer share or local printer name
; DefaultPrinterName=

; Print server
; PrinterServer=

; 1 = add a network printer
; AddNetworkPrinter=0


[-Certificates]
; 1 = import root certificate
; ImportRootCert=1

; Full path to root certificate file
; RootCertPath=C:\ProgramData\<Your Company>\Certs\corp-root.cer

; 1 = import intermediate certificate
; ImportIntermediateCert=1

; Full path to intermediate certificate file
; IntermediateCertPath=C:\ProgramData\<Your Company>\Certs\corp-intermediate.cer


[-Power]
; Balanced / High / Saver / custom GUID
; PowerPlan=Balanced

; Sleep timeout on AC power (minutes)
; SleepTimeoutAC=30

; Sleep timeout on battery/DC (minutes)
; SleepTimeoutDC=15

; 1 = enable hibernate
; HibernateEnabled=1

; Sleep / Hibernate / DoNothing / ShutDown
; LidCloseAction=Sleep


[-Devices]
; 1 = disable camera
; DisableCamera=0

; 1 = disable Bluetooth
; DisableBluetooth=0

; 1 = disable Wi-Fi
; DisableWiFi=0

; 1 = disable removable storage
; DisableRemovableStorage=1

; 1 = allow printers
; AllowPrinters=1


[Logging]
; 1 = enable logging
EnableLogging=1

; Explicit log path
LogPath=C:\ProgramData\<Your Company>\Logs

; Info / Verbose / Error
; LogLevel=Verbose

; Maximum log size in MB (script-defined)
MaxLogSizeMB=10


[Execution]
; 1 = process [System]
RunSystemSection=1

; 1 = process [Explorer]
RunExplorerSection=1

; 1 = process [Taskbar]
RunTaskbarSection=1

; 1 = process [StartMenu]
RunStartMenuSection=1

; 1 = process [Desktop]
RunDesktopSection=1

; 1 = process [RemoteDesktop]
RunRemoteDesktopSection=1

; 1 = process [Security]
RunSecuritySection=1

; 1 = process [WindowsUpdate]
RunWindowsUpdateSection=1

; 1 = process [WindowsFeatures]
RunWindowsFeaturesSection=1

; 1 = process [Applications]
RunApplicationsSection=1

; 1 = process [Office]
RunOfficeSection=1

; 1 = process [OneDrive]
RunOneDriveSection=0

; 1 = process [Network]
RunNetworkSection=0

; 1 = process [Printers]
RunPrintersSection=0

; 1 = process [Certificates]
RunCertificatesSection=0

; 1 = process [Power]
RunPowerSection=0

; 1 = process [Devices]
RunDevicesSection=0

; 1 = reboot if one or more actions require it
RebootIfRequired=1

; 1 = force reboot at end
ForceReboot=0

; 1 = skip configuration if device is detected as laptop
; SkipIfLaptop=0

; 1 = skip configuration if device is virtual machine
; SkipIfVM=0


[+Branding]
; OEM support provider name
OEMName=Contoso IT

; OEM logo path
OEMLogo=C:\ProgramData\<Your Company>\Branding\oemlogo.bmp

; Support phone
SupportPhone=651-555-1000

; Support URL
SupportURL=https://intranet.contoso.com/help

; Display company name
CompanyName=Contoso


[-Conditions]
; 1 = run only if AD domain joined
; OnlyIfDomainJoined=0

; 1 = run only if Entra/Azure AD joined
; OnlyIfAzureADJoined=0

; 1 = run only if laptop
; OnlyIfLaptop=0

; 1 = run only if desktop
; OnlyIfDesktop=0

; Minimum Windows version required
; MinimumOSVersion=10.0.22621


[-Custom]
; Optional script #1
; RunScript1=C:\ProgramData\<Your Company>\Scripts\PostInstall.ps1

; Optional script #2
; RunScript2=C:\ProgramData\<Your Company>\Scripts\Finalize.ps1

; Optional .reg file import
; RegistryFileImport=C:\ProgramData\<Your Company>\Registry\custom.reg

; Optional command to run
; CustomCommand=cmd.exe /c echo Configuration complete